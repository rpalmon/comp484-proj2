<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <!-- icon -->
    <link rel="icon" type="image/x-icon" href="/images/dino.webp">
  </head>
  <body>
    <header>
      <h1>
        This is your Giga Pet
      </h1>
      <button  class="reset">
        Reset Pet
      </button>
    </header>

    <main>
      <section class="pet-manager" aria-label="Pet tabs manager">
        <div class="pet-tabs-list" role="tablist" aria-label="Your pets"></div>
        <button class="add-pet-button" type="button" aria-label="Create a new pet">+</button>
      </section>

      <section class="pet-image-container">
        <!-- Replace pet image with your own pet image -->
        <img class="pet-image" src="/images/dino.webp" alt="Your pet image">
      </section>
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div class="button-container">
          <button class="treat-button">
            Treat
          </button>
          <button class="play-button">
            Play
          </button>
          <button class="exercise-button">
            Exercise
          </button>
        </div>
      </section>
      <section class="activity-log">
        <h2>Activity Log</h2>
        <ul class="activity-list">
          <!-- Activity log items will go here -->
        </ul>
      </section>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
